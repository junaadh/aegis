#:schema https://raw.githubusercontent.com/junaadh/aegis/schemas/config/v1.json

# aegis.toml — Aegis Authentication & Identity Platform
# Version: 1.0
# Schema: https://raw.githubusercontent.com/junaadh/aegis/schemas/config/v1.json
[server]
host = "0.0.0.0"
port = 8080
log_level = "info"
log_format = "json"
log_output = ["stdout"]

[database]
url = "postgresql://aegis:password@localhost:5432/aegis"
max_connections = 25
min_idle = 5
connection_timeout_seconds = 30

[redis]
enabled = false
url = "redis://127.0.0.1:6379/0"
max_connections = 10

[session]
secret = "env:AEGIS_SESSION_SECRET"
max_age_hours = 168
idle_timeout_minutes = 30

[session.cookie]
name = "aegis_session"
path = "/"
secure = true
http_only = true
same_site = "lax"

[session.bearer]
opaque_token_length = 32
default_ttl_minutes = 15
refresh_token_enabled = false
refresh_token_ttl_days = 30

[credentials.password]
hashing_algorithm = "argon2id"

[credentials.password.argon2]
time_cost = 3
memory_cost = 65536
parallelism = 2

[credentials.password.policy]
min_length = 12
require_uppercase = true
require_lowercase = true
require_digit = true
require_symbol = true
disallow_common = true

[credentials.passkeys]
origins = []
user_verification = "preferred"
resident_key = "preferred"
timeout_seconds = 60

[credentials.mfa.totp]
period = 30
digits = 6
algorithm = "SHA1"
skew = 1

[credentials.mfa.totp.recovery_codes]
count = 10
code_length = 12

[email]
enabled = true

[email.smtp]
port = 587
starttls = true
timeout_seconds = 30

[email.templates]

[api]
metadata_allowed_keys = []

[api.rate_limit]
enabled = true
requests_per_minute = 60
burst = 10

[api.internal]
allowed_cidrs = []

[crypto.jwt]
enabled = false
algorithm = "RS256"

[compliance.data_retention]
audit_log_days = 2555
guest_ttl_days = 30
deleted_user_anonymize_after_days = 0

[compliance.deletion]
anonymize_email_pattern = "deleted-{hash}@anonymized.local"
preserve_referential_integrity = true

[webhooks]
enabled = false
endpoints = []

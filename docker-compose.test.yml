services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U aegis -d aegis_test
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 2s

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 2s

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1026:1025"
      - "8026:8025"

services:
  postgres:
    image: postgres:17-alpine
    container_name: aegis-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
    ports:
      - "${POSTGRES_PORT:?set POSTGRES_PORT in .env}:5432"
    volumes:
      - aegis-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    ports:
      - "${REDIS_PORT:?set REDIS_PORT in .env}:6379"
    volumes:
      - aegis-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: aegis-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:?set MAILPIT_SMTP_PORT in .env}:1025"
      - "${MAILPIT_WEB_PORT:?set MAILPIT_WEB_PORT in .env}:8025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

volumes:
  aegis-postgres-data:
    name: aegis-postgres-data
  aegis-redis-data:
    name: aegis-redis-data
